spring:
  datasource:
    # MySQL 데이터베이스 연결 정보 설정
    # 사용하시는 로컬 MySQL Port(기본 3306)와 스키마명(여기서는 lion_pbl)을 매핑합니다.
    # 테스트 전 MySQL에서 'create database lion_pbl;' 명령어로 데이터베이스를 먼저 생성해 주세요.
    url: jdbc:mysql://localhost:3306/lion_pbl?serverTimezone=UTC&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: password # 사용하시는 로컬 MySQL 비밀번호로 변경하여 사용해 주세요.
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # ddl-auto: update -> 엔티티 변경 사항을 DB에 자동으로 반영(테이블 자동 생성 및 변경)합니다.
      # 개발 단계에서는 편의를 위해 update를 주로 사용합니다. (실운영 환경에서는 절대 validate/none 외 사용 금지)
      ddl-auto: update
    show-sql: true # 하이버네이트가 생성하는 SQL 쿼리를 콘솔 창에 출력합니다.
    properties:
      hibernate:
        format_sql: true # 출력되는 SQL 쿼리를 가독성 있게 포맷팅합니다.
        highlight_sql: true # SQL 예약어에 색상을 입혀 가독성을 높입니다.
        default_batch_fetch_size: 100 # JPA 성능 최적화를 위한 배치 페치 사이즈 설정
